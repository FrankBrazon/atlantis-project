<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atlantisProject - Open 26.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="atlantisproject.PNG" alt="Logo" width="350">
        <h2>OPEN 26.3</h2>
    </header>

    <main class="container">
        <!-- TABLA DE RESULTADOS -->
        <div class="table-responsive">
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Atleta</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS cargará los datos aquí -->
                </tbody>
            </table>
        </div>

        <!-- FORMULARIO PARA AGREGAR -->
        <section class="form-card">
            <h3>AÑADIR PARTICIPANTE</h3>
            
            <div class="input-group">
                <input type="text" id="nombre" placeholder="Nombre completo">
                <select id="tipoResultado" onchange="toggleInputs()">
                    <option value="tiempo">Completó (Tiempo)</option>
                    <option value="reps">No completó (Reps)</option>
                </select>
            </div>

            <!-- Sección Tiempo -->
            <div id="sectionTiempo" class="input-group">
                <input type="text" id="inputTiempo" placeholder="Tiempo (Ej: 11:32)">
            </div>

            <!-- Sección Reps -->
            <div id="sectionReps" class="input-group" style="display:none;">
                <select id="selectEjercicio" onchange="actualizarPrevisualizacionReps()">
                    <!-- Se llena con JS -->
                </select>
                <input type="number" id="inputRepsExtra" placeholder="Reps en este paso" oninput="actualizarPrevisualizacionReps()">
                <div id="previewReps" class="preview-text">Total acumulado: 0 reps</div>
            </div>

            <button onclick="agregarScore()">GUARDAR RESULTADO</button>
        </section>

        <div class="actions">
            <button onclick="limpiarTodo()" class="btn-clear">Borrar todos los datos</button>
        </div>
    </main>

    <script>
        const APP_STORAGE_KEY_CONFIG = 'atlantisScores_26_3';
        const APP_WOD_CONFIG = [
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Cleans, weight 1", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Thrusters, weight 1", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Cleans, weight 1", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Thrusters, weight 1", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Cleans, weight 2", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Thrusters, weight 2", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Cleans, weight 2", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Thrusters, weight 2", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Cleans, weight 3", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Thrusters, weight 3", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Cleans, weight 3", reps: 12 },
            { nombre: "12 Burpees over the bar", reps: 12 },
            { nombre: "12 Thrusters, weight 3", reps: 12 }
        ];
    </script>
    <script src="script.js"></script>
</body>
</html>
